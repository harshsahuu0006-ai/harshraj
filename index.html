<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
}

/* FIXED LOVE BACKGROUND */
body{
background:linear-gradient(135deg,#ff0080,#ff4da6,#ff66cc,#ff99dd);
background-attachment:fixed;
position:relative;
color:white;
}

/* extra overlay hearts */
body::before{
content:"💖 💕 💘 💝 💗 💞";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
font-size:40px;
opacity:0.08;
display:flex;
flex-wrap:wrap;
justify-content:space-around;
align-content:space-around;
pointer-events:none;
}

/* screens */
.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
z-index:2;
}

#main{
display:none;
}

button{
padding:15px 30px;
font-size:24px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,.6);
}

h1{
font-size:36px;
text-shadow:0 0 10px #fff;
margin-bottom:15px;
}

p{
font-size:24px;
line-height:1.6;
font-weight:bold;
text-shadow:0 0 8px #000;
}

#cake{
font-size:120px;
display:none;
margin-top:20px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-12px);}
}

#love{
display:none;
font-size:40px;
margin-top:20px;
text-shadow:0 0 15px #fff;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.float{
position:absolute;
bottom:-50px;
font-size:30px;
animation:up linear infinite;
z-index:1;
}

@keyframes up{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div id="start" class="screen">
<button onclick="openGift()">🎁 Open Surprise</button>
</div>

<div id="main" class="screen">

<audio id="song" controls autoplay loop style="margin-bottom:15px;">
<source src="https://files.catbox.moe/6y6j7x.mp3" type="audio/mpeg">
</audio>

<h1>🎉 Happy Birthday Meri Jaan ❤️</h1>

<p>
Aap Hamesha Khush Raho 😊<br>
Aapki Smile Hamesha Aise Hi Rahe ✨<br>
Aap Mere Liye Sabse Special Ho 💖
</p>

<div id="cake">🎂</div>

<button id="more" onclick="showLove()" style="display:none;margin-top:20px;">
Show More
</button>

<div id="love">I Love You 😘💞</div>

</div>

<script>
function openGift(){
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="flex";
document.getElementById("song").play();

setTimeout(()=>{
document.getElementById("cake").style.display="block";
document.getElementById("more").style.display="inline-block";
},2500);

/* floating emojis */
let arr=["💖","💕","🎈","✨","💘"];
for(let i=0;i<25;i++){
let x=document.createElement("div");
x.className="float";
x.innerHTML=arr[Math.floor(Math.random()*arr.length)];
x.style.left=Math.random()*100+"%";
x.style.animationDuration=(4+Math.random()*6)+"s";
x.style.fontSize=(22+Math.random()*20)+"px";
document.body.appendChild(x);
}
}

function showLove(){
document.getElementById("love").style.display="block";
}
</script>

</body>
</html>
