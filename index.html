<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Meri Jaan</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', cursive;
      text-align: center;
      color: #fff;
      background: url('background.jpg') center/cover no-repeat;
      overflow: hidden;
    }
    #startScreen, #mainScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }
    #mainScreen { display: none; }
    button {
      padding: 15px 30px;
      font-size: 22px;
      background-color: #ff6f61;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 40vh;
      box-shadow: 0 0 20px #ff3b2e;
    }
    #message {
      font-size: 24px;
      margin-top: 20px;
      animation: fadeIn 2s ease-in-out;
      text-shadow: 0 0 10px #ffdde1;
    }
    @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    #cake {
      display: none;
      margin: 30px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 30px #ff9a9e;
    }
    #showMore { display: none; margin-top: 20px; }
    #loveMessage {
      display: none;
      font-size: 36px;
      color: #fff;
      margin-top: 20px;
      text-shadow: 0 0 20px #ff6f61, 0 0 40px #ff3b2e;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from {text-shadow: 0 0 10px #ff6f61;}
      to {text-shadow: 0 0 30px #ff3b2e;}
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <button onclick="openSurprise()">Open Surprise</button>
  </div>

  <div id="mainScreen">
    <audio id="song" src="happy-birthday.mp3"></audio>
    <div id="message">
      🎉 Happy Birthday Meri Jaan ❤️<br>
      Aap Hamesha Khush Rho<br>
      Avi Aap Jaise Smile Kr Rhi Ho<br>
      Wese Hi Hamesha Smile Karti Rho<br>
      Aap Meri Jaan Ho 🤩
    </div>
    <img id="cake" src="cake.jpg" alt="Birthday Cake">
    <button id="showMore" onclick="showLove()">Show More</button>
    <div id="loveMessage">I Love You 😘❣💞</div>
  </div>

  <script>
    function openSurprise() {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("mainScreen").style.display = "block";
      document.getElementById("song").play();
      setTimeout(() => {
        document.getElementById("cake").style.display = "block";
        document.getElementById("showMore").style.display = "inline-block";
      }, 4000);
    }
    function showLove() {
      document.getElementById("loveMessage").style.display = "block";
    }
  </script>
</body>
</html>
