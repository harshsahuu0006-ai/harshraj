<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body{
margin:0;
padding:0;
text-align:center;
font-family:Arial;
overflow:hidden;
color:white;
background:linear-gradient(-45deg,#ff0080,#ff8c00,#40e0d0,#ff1493);
background-size:400% 400%;
animation:bg 8s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#start,#main{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
}

#main{display:none;}

button{
padding:15px 30px;
font-size:24px;
border:none;
border-radius:10px;
background:#ff1493;
color:white;
margin-top:40vh;
box-shadow:0 0 20px white;
}

#text{
font-size:30px;
margin-top:40px;
padding:15px;
text-shadow:0 0 10px white;
}

#cake{
font-size:120px;
display:none;
margin-top:20px;
}

#love{
display:none;
font-size:40px;
margin-top:20px;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.balloon{
position:absolute;
bottom:-50px;
font-size:35px;
animation:fly 7s linear infinite;
}

@keyframes fly{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div id="start">
<button onclick="openGift()">🎁 Open Surprise</button>
</div>

<div id="main">

<audio id="song" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<div id="text">
🎉 Happy Birthday Meri Jaan ❤️<br><br>
Aap Hamesha Khush Raho 😊<br>
Aapki Smile Hamesha Aise Hi Rahe ✨
</div>

<div id="cake">🎂</div>

<button id="more" onclick="showLove()" style="display:none;margin-top:20px;">Show More</button>

<div id="love">I Love You 😘💞</div>

</div>

<script>
function openGift(){
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("song").play();

setTimeout(()=>{
document.getElementById("cake").style.display="block";
document.getElementById("more").style.display="inline-block";
},3000);

for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(b);
}
}

function showLove(){
document.getElementById("love").style.display="block";
}
</script>

</body>
</html>
