<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
text-align:center;
color:white;
background:linear-gradient(135deg,#ff0080,#ff8c00,#ffd700,#ff1493);
background-size:400% 400%;
animation:bgmove 8s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#main{
display:none;
padding:20px;
}

button{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
box-shadow:0 0 20px white;
cursor:pointer;
}

h1{
font-size:38px;
margin-bottom:15px;
text-shadow:0 0 15px white;
}

p{
font-size:24px;
line-height:1.6;
text-shadow:0 0 10px white;
}

#cake{
font-size:130px;
margin-top:20px;
display:none;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-15px);}
}

#love{
display:none;
font-size:40px;
margin-top:20px;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.balloon{
position:absolute;
bottom:-80px;
font-size:35px;
animation:fly linear infinite;
}

@keyframes fly{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div id="start" class="screen">
<button onclick="startSurprise()">🎁 Open Surprise</button>
</div>

<div id="main" class="screen">

<audio id="song" controls autoplay loop style="margin-bottom:20px;">
<source src="https://files.catbox.moe/6y6j7x.mp3" type="audio/mpeg">
</audio>

<h1>🎉 Happy Birthday Meri Jaan ❤️</h1>

<p>
Aap Hamesha Khush Raho 😊 <br>
Aapki Smile Hamesha Aise Hi Rahe ✨ <br>
Aap Mere Liye Sabse Special Ho 💖
</p>

<div id="cake">🎂</div>

<button id="moreBtn" onclick="showLove()" style="display:none; margin-top:20px;">Show More</button>

<div id="love">I Love You 😘💞</div>

</div>

<script>
function startSurprise(){
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="flex";

let music=document.getElementById("song");
music.play();

setTimeout(function(){
document.getElementById("cake").style.display="block";
document.getElementById("moreBtn").style.display="inline-block";
},3000);

for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(4+Math.random()*5)+"s";
b.style.fontSize=(25+Math.random()*20)+"px";
document.body.appendChild(b);
}
}

function showLove(){
document.getElementById("love").style.display="block";
}
</script>

</body>
</html>
