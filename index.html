<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Surprise</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Poppins', sans-serif;
  overflow:hidden;
  text-align:center;
  color:white;
  background: linear-gradient(135deg,#ff4e50,#fc913a,#f9d423,#ff6ec4);
  background-size:400% 400%;
  animation:bgMove 8s infinite alternate;
}

@keyframes bgMove{
  0%{background-position:left;}
  100%{background-position:right;}
}

#startScreen,#mainScreen{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

#mainScreen{
  display:none;
  padding-top:40px;
}

button{
  padding:16px 35px;
  font-size:24px;
  border:none;
  border-radius:12px;
  background:#ff1493;
  color:white;
  cursor:pointer;
  margin-top:40vh;
  box-shadow:0 0 20px #fff;
}

button:hover{
  transform:scale(1.05);
}

#message{
  font-size:28px;
  padding:15px;
  text-shadow:0 0 15px #fff;
  animation:fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

#cake{
  display:none;
  width:280px;
  margin-top:25px;
  border-radius:20px;
  box-shadow:0 0 25px white;
}

#showMore{
  display:none;
  margin-top:20px;
}

#loveMessage{
  display:none;
  font-size:42px;
  margin-top:20px;
  color:#fff;
  text-shadow:0 0 20px #ff1493,0 0 35px red;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

.balloon{
  position:absolute;
  bottom:-100px;
  width:40px;
  animation:fly 8s linear infinite;
}

@keyframes fly{
  from{transform:translateY(0);}
  to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div id="startScreen">
<button onclick="openSurprise()">🎁 Open Surprise</button>
</div>

<div id="mainScreen">

<audio id="song" autoplay loop>
<source src="birthday-song.mp3" type="audio/mpeg">
</audio>

<div id="message">
🎉 Happy Birthday Meri Jaan ❤️ <br><br>
Aap Hamesha Khush Raho 😊 <br>
Aapki Smile Hamesha Aise Hi Rahe ✨ <br>
Aap Meri Sabse Special Ho 💖
</div>

<img id="cake" src="https://i.imgur.com/V7b1M9D.png">

<br>

<button id="showMore" onclick="showLove()">💌 Show More</button>

<div id="loveMessage">
I Love You 😘💞
</div>

</div>

<script>

function openSurprise(){
document.getElementById("startScreen").style.display="none";
document.getElementById("mainScreen").style.display="block";

document.getElementById("song").play();

setTimeout(()=>{
document.getElementById("cake").style.display="block";
document.getElementById("showMore").style.display="inline-block";
},3000);

createBalloons();
}

function showLove(){
document.getElementById("loveMessage").style.display="block";
}

function createBalloons(){
for(let i=0;i<15;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"%";
b.style.fontSize=(30+Math.random()*20)+"px";
b.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(b);
}
}

</script>

</body>
</html>
