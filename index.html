<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Meri Jaan</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: radial-gradient(circle at center, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
    }
    #startScreen, #mainScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }
    #mainScreen {
      display: none;
      background: url('background.jpg') center/cover no-repeat;
    }
    button {
      padding: 15px 30px;
      font-size: 22px;
      background-color: #ff6f61;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 250px;
    }
    button:hover {
      background-color: #ff3b2e;
    }
    #message {
      font-size: 28px;
      margin-top: 40px;
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    #cake {
      display: none;
      margin: 30px auto;
      width: 300px;
    }
    #showMore {
      display: none;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #ff6f61;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    #loveMessage {
      display: none;
      font-size: 36px;
      color: #ffdde1;
      margin-top: 20px;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from {text-shadow: 0 0 10px #ff6f61;}
      to {text-shadow: 0 0 20px #ff3b2e;}
    }
    .confetti, .firework {
      position: absolute;
      width: 10px;
      height: 10px;
      background: yellow;
      animation: fall 4s infinite ease-in;
    }
    @keyframes fall {
      0% {transform: translateY(0);}
      100% {transform: translateY(100vh);}
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <button onclick="openSurprise()">Open Surprise</button>
  </div>

  <div id="mainScreen">
    <audio id="song" src="happy-birthday.mp3"></audio>
    <div id="message">
      🎉 Happy Birthday Meri Jaan ❤️<br>
      Aap Hamesha Khush Rho Avi Aap Jaise Smile Kr Rhi Ho<br>
      Wese Hi Hamesha Smile Karti Rho<br>
      Aap Meri Jaan Ho 🥰
    </div>
    <img id="cake" src="cake.png" alt="Birthday Cake">
    <button id="showMore" onclick="showLove()">Show More</button>
    <div id="loveMessage">I Love You 😘❣💞</div>
  </div>

  <script>
    function openSurprise() {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("mainScreen").style.display = "block";
      document.getElementById("song").play();
      createConfetti();
      createFireworks();
      setTimeout(() => {
        document.getElementById("cake").style.display = "block";
        document.getElementById("showMore").style.display = "inline-block";
      }, 4000);
    }

    function showLove() {
      document.getElementById("loveMessage").style.display = "block";
    }

    function createConfetti() {
      for(let i=0; i<40; i++){
        let confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.background = ["yellow","purple","orange","cyan","pink"][Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (2+Math.random()*3) + "s";
        document.body.appendChild(confetti);
      }
    }

    function createFireworks() {
      for(let i=0; i<10; i++){
        let firework = document.createElement("div");
        firework.className = "firework";
        firework.style.left = Math.random()*100 + "vw";
        firework.style.top = Math.random()*50 + "vh";
        firework.style.background = ["red","blue","green","yellow","white"][Math.floor(Math.random()*5)];
        firework.style.boxShadow = "0 0 20px " + firework.style.background;
        firework.style.animation = "fadeIn 1s ease-in-out infinite alternate";
        document.body.appendChild(firework);
      }
    }
  </script>
</body>
</html>
