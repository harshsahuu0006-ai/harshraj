<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
}

body{
background:url('background.jpg') no-repeat center center/cover;
color:white;
}

/* Dark overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
z-index:2;
}

#main{
display:none;
}

button{
padding:15px 30px;
font-size:24px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,.5);
}

h1{
font-size:34px;
text-align:center;
margin-bottom:15px;
text-shadow:0 0 12px #000;
}

p{
font-size:24px;
line-height:1.6;
text-align:center;
font-weight:bold;
text-shadow:0 0 10px #000;
}

#cake{
font-size:120px;
display:none;
margin-top:20px;
}

#love{
display:none;
font-size:40px;
margin-top:20px;
font-weight:bold;
text-shadow:0 0 10px #fff;
}

.float{
position:absolute;
bottom:-50px;
font-size:28px;
animation:up linear infinite;
z-index:1;
}

@keyframes up{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div id="start" class="screen">
<button onclick="openGift()">🎁 Open Surprise</button>
</div>

<div id="main" class="screen">

<!-- WORKING SONG -->
<audio id="song" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<h1>🎉 Happy Birthday Meri Jaan ❤️</h1>

<p>
Aap Hamesha Khush Raho 😊<br>
Aapki Smile Hamesha Aise Hi Rahe ✨<br>
Aap Mere Liye Sabse Special Ho 💖
</p>

<div id="cake">🎂</div>

<button id="more" onclick="showLove()" style="display:none;margin-top:20px;">
Show More
</button>

<div id="love">I Love You 😘💞</div>

</div>

<script>
function openGift(){

document.getElementById("start").style.display="none";
document.getElementById("main").style.display="flex";

/* FINAL SONG FIX */
var music=document.getElementById("song");
music.volume=1;
music.play();

setTimeout(function(){
document.getElementById("cake").style.display="block";
document.getElementById("more").style.display="inline-block";
},2500);

/* floating items */
let arr=["💖","💕","🎈","✨"];
for(let i=0;i<20;i++){
let x=document.createElement("div");
x.className="float";
x.innerHTML=arr[Math.floor(Math.random()*arr.length)];
x.style.left=Math.random()*100+"%";
x.style.animationDuration=(4+Math.random()*5)+"s";
document.body.appendChild(x);
}
}

function showLove(){
document.getElementById("love").style.display="block";
}
</script>

</body>
</html>
