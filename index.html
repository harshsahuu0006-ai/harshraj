<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
text-align:center;
color:white;

/* LOVE BACKGROUND */
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1200&q=80');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* Floating hearts */
.heart{
position:absolute;
bottom:-50px;
font-size:28px;
animation:fly 8s linear infinite;
opacity:0.8;
}

@keyframes fly{
from{
transform:translateY(0) scale(1);
opacity:1;
}
to{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

#main{
display:none;
}

button{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff69b4;
}

h1{
font-size:38px;
text-shadow:0 0 15px #fff;
margin-bottom:15px;
}

p{
font-size:24px;
line-height:1.6;
text-shadow:0 0 12px #000;
font-weight:bold;
}

#cake{
font-size:130px;
display:none;
margin-top:20px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-15px);}
}

#love{
display:none;
font-size:42px;
margin-top:20px;
text-shadow:0 0 20px #ff1493;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}
</style>
</head>

<body>

<div id="start" class="screen">
<button onclick="startSurprise()">🎁 Open Surprise</button>
</div>

<div id="main" class="screen">

<audio id="song" controls autoplay loop style="margin-bottom:20px;">
<source src="https://files.catbox.moe/6y6j7x.mp3" type="audio/mpeg">
</audio>

<h1>🎉 Happy Birthday Meri Jaan ❤️</h1>

<p>
Aap Hamesha Khush Raho 😊 <br>
Aapki Smile Hamesha Aise Hi Rahe ✨ <br>
Aap Mere Liye Sabse Special Ho 💖
</p>

<div id="cake">🎂</div>

<button id="moreBtn" onclick="showLove()" style="display:none; margin-top:20px;">
Show More
</button>

<div id="love">I Love You 😘💞</div>

</div>

<script>
function startSurprise(){
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="flex";

document.getElementById("song").play();

setTimeout(()=>{
document.getElementById("cake").style.display="block";
document.getElementById("moreBtn").style.display="inline-block";
},3000);

/* Floating hearts */
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(5+Math.random()*5)+"s";
h.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(h);
}
}

function showLove(){
document.getElementById("love").style.display="block";
}
</script>

</body>
</html>
